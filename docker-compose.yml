version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-default}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      GRAPH_BACKEND: ${GRAPH_BACKEND:-neo4j}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-freight_neo4j_pass}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      LOG_LEVEL: INFO
    command: >
      sh -c "alembic upgrade head && python scripts/seed_loader.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-freight_neo4j_pass}
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs:
